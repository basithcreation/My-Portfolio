<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 90" width="480" height="90">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8f542"/>
      <stop offset="100%" stop-color="#60efff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Logo mark: square with B -->
  <rect x="0" y="8" width="74" height="74" rx="16" fill="#0a0a0f"/>
  <rect x="0" y="8" width="74" height="74" rx="16" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Corner accents on mark -->
  <path d="M10 22 L10 12 L20 12" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M64 68 L64 78 L54 78" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <text x="37" y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700" font-size="52"
    text-anchor="middle"
    fill="url(#g1)" filter="url(#glow)">B</text>
  <circle cx="59" cy="62" r="5" fill="#c8f542" opacity="0.9"/>

  <!-- Wordmark text -->
  <text x="96" y="52"
    font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif"
    font-weight="800" font-size="34"
    fill="#f0f0f0" letter-spacing="-1">basith</text>

  <text x="283" y="52"
    font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif"
    font-weight="800" font-size="34"
    fill="url(#g1)" letter-spacing="-1">dev</text>

  <!-- Tagline -->
  <text x="97" y="72"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#3a4252" letter-spacing="3.5">flutter · IT · web</text>
</svg>
