<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8f542"/>
      <stop offset="100%" stop-color="#60efff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background with slight gradient -->
  <rect width="200" height="200" rx="40" fill="#060608"/>
  <rect width="200" height="200" rx="40" fill="rgba(200,245,66,0.03)"/>

  <!-- Terminal bar at top -->
  <rect x="12" y="12" width="176" height="32" rx="8" fill="rgba(255,255,255,0.04)"/>
  <circle cx="30" cy="28" r="5" fill="#f87171" opacity="0.8"/>
  <circle cx="46" cy="28" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="62" cy="28" r="5" fill="#4ade80" opacity="0.8"/>
  <text x="100" y="33" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.3)">basithdev.sh</text>

  <!-- Terminal prompt: >_ -->
  <text x="28" y="90" font-family="'Courier New', monospace" font-weight="700" font-size="28" fill="rgba(200,245,66,0.5)">&#62;_</text>

  <!-- B lettermark — large, centered lower -->
  <text x="110" y="150"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700" font-size="90"
    text-anchor="middle"
    fill="url(#g1)" filter="url(#glow)">B</text>

  <!-- Blinking cursor dot -->
  <rect x="154" y="130" width="8" height="28" rx="2" fill="#c8f542" opacity="0.9"/>

  <!-- Border -->
  <rect x="1" y="1" width="198" height="198" rx="39" fill="none" stroke="url(#g1)" stroke-width="1" stroke-opacity="0.3"/>
</svg>
